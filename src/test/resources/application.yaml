spring:
  datasource:
    url: jdbc:h2:mem:lxpdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

lxp:
  auth:
    jwt:
      secret: lxp-jwt-secret-key-for-test-environment-1234567890
